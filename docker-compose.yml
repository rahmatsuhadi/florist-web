version: '3.8'

services:
  db:
    image: postgres:15
    container_name: florist-postgres
    restart: always
    environment:
      POSTGRES_USER: florist_admin
      POSTGRES_PASSWORD: florist_secure_password_123
      POSTGRES_DB: florist_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
